version: '3.8'

services:
  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: test-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    command: mosquitto -c /mosquitto/config/mosquitto.conf

  mock-dbus:
    build:
      context: ./mock-dbus
    container_name: test-dbus
    environment:
      - MQTT_HOST=mqtt-broker
      - MQTT_PORT=1883
    depends_on:
      - mqtt-broker
    restart: unless-stopped

  mock-battery:
    build:
      context: ./mock-battery
    container_name: test-mock-battery
    environment:
      - MQTT_HOST=mqtt-broker
      - MQTT_PORT=1883
    depends_on:
      - mqtt-broker
    restart: unless-stopped

  mock-pv:
    build:
      context: ./mock-pv
    container_name: test-mock-pv
    environment:
      - MQTT_HOST=mqtt-broker
      - MQTT_PORT=1883
    depends_on:
      - mqtt-broker
    restart: unless-stopped

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test-runner
    container_name: test-runner
    environment:
      - MQTT_HOST=mqtt-broker
      - MQTT_PORT=1883
      - DASHBOARD_URL=ws://dashboard-go:8080/ws
    depends_on:
      mqtt-broker:
        condition: service_started
      mock-battery:
        condition: service_started
      mock-pv:
        condition: service_started
    volumes:
      - ./tests:/app/tests:ro

  # Optional: enable when Dockerfile.test exists in each project
  # dashboard-go:
  #   build:
  #     context: ../inverter-dashboard-go
  #     dockerfile: Dockerfile.test
  #   ports:
  #     - "8080:8080"
